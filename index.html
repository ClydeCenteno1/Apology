<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apology Website</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

</head>

<body class="bg-[url('background.jpg')] bg-no-repeat bg-cover">

    <section class="flex flex-col justify-center items-center w-screen h-screen p-4">
        <audio id="bg-music" src="music.mp3" loop></audio>

        <div class="flex justify-center">
            <div class="h-[345px] w-[345px]">
                <img src="kiss.jpg" class="rounded-lg shadow-lg w-full h-auto">
            </div>
        </div>

        <div class="container bg-pink-300 border-2 p-4 rounded-lg mt-3 shadow-lg">
            <p class="text-[1.55rem] text-white font-bold font-[Quicksand]">Hello my love, I am truly sorry for my words
                and the pain
                they
                caused you. You mean the world to me, and it breaks my heart that I hurt you. I promise to keep working
                on myself and doing better for us, because I want to spend forever with you. I love you, always. 🩷
            </p>
        </div>
    </section>



    <script src="app.js"></script>
</body>

</html>
